{% extends "base.html" %}

{% block title %}Sign In — PT Generator{% endblock %}

{% block content %}
<div class="flex items-center justify-center" style="min-height: 60vh;">
  <div class="form-card" style="max-width: 400px; width: 100%; text-align: center; padding: 2.5rem 2rem;">

    <div style="margin-bottom: 1.5rem;">
      <span style="font-size: 3rem;">🏋️</span>
    </div>

    <h1 class="font-display" style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: #111827;">
      PT Generator
    </h1>
    <p style="color: #6b7280; font-size: 0.95rem; margin-bottom: 2rem;">
      AI-powered session plans for personal trainers.
    </p>

    <a href="/auth/google"
       style="display: inline-flex; align-items: center; gap: 0.75rem; background: #fff; border: 1px solid #d1d5db;
              color: #374151; padding: 0.65rem 1.5rem; border-radius: 6px; font-size: 0.95rem; font-weight: 500;
              text-decoration: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: box-shadow 0.15s;">
      <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </a>

  </div>
</div>
{% endblock %}
